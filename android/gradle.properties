org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
android.enableJetifier=true
org.gradle.daemon=false
org.gradle.parallel=false
org.gradle.configureondemand=false
org.gradle.jvmargs=-Xmx2048m
systemProp.user.language=en
systemProp.user.country=US
org.gradle.daemon=true
org.gradle.jvmargs=-Xmx4096m -Dfile.encoding=UTF-8

# ===== Timeouts (45 minutes) =====
org.gradle.internal.http.connectionTimeout=2700000
org.gradle.internal.http.socketTimeout=2700000

# ===== Retry policy =====
org.gradle.internal.repository.max.retries=15
org.gradle.internal.repository.initial.backoff=15000
